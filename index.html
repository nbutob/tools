<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1C2B1E">
<title>Phụ kiện Lộc Nguyên</title>
<style>
:root{
  --g9:#1C2B1E;--g7:#2D4A31;--g5:#3D6B42;--g3:#6A9E6F;--g1:#C8E6CA;--g0:#EEF6EF;
  --am:#D4860A;--am0:#FEF3DC;--rd:#C0392B;--rd0:#FDECEA;
  --w:#fff;--f8:#F8F9F8;--f1:#EFF0EF;--f3:#C8CAC8;--f5:#6B6F6B;--f7:#3A3D3A;--f9:#1A1C1A;
  --r:10px;--sh:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--f8);color:var(--f9);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--g9);color:var(--w);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.brand-dot{width:8px;height:8px;background:var(--g3);border-radius:50%}
.uinfo{font-size:12px;color:var(--g3);display:flex;align-items:center;gap:10px}
.btn-out{background:none;border:1px solid var(--g7);color:var(--g3);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer}
.btn-out:hover{background:var(--g7);color:var(--w)}

/* NAV TABS (xây tự động theo role) */
.nav{background:var(--w);border-bottom:1px solid var(--f1);display:flex;padding:0 16px;overflow-x:auto}
.ntab{font-size:13px;padding:13px 15px;border-bottom:2px solid transparent;color:var(--f5);cursor:pointer;white-space:nowrap;user-select:none}
.ntab.active{color:var(--g7);border-bottom-color:var(--g5);font-weight:600}
.ntab:hover:not(.active){color:var(--f7)}

main{max-width:660px;margin:0 auto;padding:18px 14px}
.page{display:none}.page.active{display:block}
.card{background:var(--w);border-radius:var(--r);border:1px solid var(--f1);padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{font-size:13px;font-weight:600;color:var(--f9);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-title::before{content:'';width:3px;height:15px;background:var(--g5);border-radius:2px;display:block;flex-shrink:0}

.f{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.f:last-child{margin-bottom:0}
label{font-size:11px;color:var(--f5);font-weight:500;letter-spacing:.02em}
input,select{border:1px solid var(--f3);border-radius:8px;padding:9px 11px;font-size:14px;color:var(--f9);background:var(--w);transition:border .15s;width:100%}
input:focus,select:focus{outline:none;border-color:var(--g5);box-shadow:0 0 0 3px rgba(61,107,66,.1)}
input::placeholder{color:var(--f3)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;font-size:14px;font-weight:500;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;transition:all .15s}
.btn-p{background:var(--g7);color:var(--w);width:100%;margin-top:6px}
.btn-p:hover{background:var(--g9)}.btn-p:disabled{background:var(--f3);cursor:not-allowed}
.btn-s{background:var(--f1);color:var(--f7);width:auto;margin:0;padding:8px 14px;font-size:13px}
.btn-s:hover{background:var(--f3)}

/* ALERT */
.al{padding:11px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;line-height:1.5}
.al-ok{background:var(--g0);color:var(--g7);border:1px solid var(--g1)}
.al-er{background:var(--rd0);color:var(--rd);border:1px solid #F5C6C2}
.al-in{background:var(--am0);color:var(--am);border:1px solid #F5DFA0}

/* LOGIN */
.lw{max-width:340px;margin:56px auto;padding:0 14px}
.lo{text-align:center;margin-bottom:24px}
.lo h1{font-size:22px;color:var(--g9);font-weight:700}
.lo p{font-size:13px;color:var(--f5);margin-top:4px}

/* SIG PAD */
.sig-wrap{border:1.5px dashed var(--f3);border-radius:8px;background:var(--f8);position:relative;overflow:hidden}
.sig-wrap canvas{display:block;touch-action:none;cursor:crosshair;width:100%}
.sig-hint{position:absolute;bottom:8px;right:10px;font-size:11px;color:var(--f3);pointer-events:none;transition:opacity .2s}
.sig-signed .sig-hint{opacity:0}
.sig-row{display:flex;justify-content:flex-end;margin-top:5px}
.btn-clr{background:none;border:1px solid var(--f3);color:var(--f5);font-size:11px;padding:3px 10px;border-radius:5px;cursor:pointer}
.btn-clr:hover{border-color:var(--rd);color:var(--rd)}

/* BAO CAO TABLE */
.stock-table{width:100%;border-collapse:collapse;font-size:12px}
.stock-table th{background:var(--g9);color:var(--w);padding:8px 10px;text-align:left;font-weight:500}
.stock-table td{padding:8px 10px;border-bottom:1px solid var(--f1);vertical-align:middle}
.stock-table tr:hover td{background:var(--f8)}
.stock-tag{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500;display:inline-block}
.stock-ok{background:var(--g0);color:var(--g7)}
.stock-low{background:var(--am0);color:var(--am)}
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1}

/* MISC */
.ld{text-align:center;padding:40px;color:var(--f5)}
.sp{width:26px;height:26px;border:3px solid var(--f1);border-top-color:var(--g5);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:44px 20px;color:var(--f5)}
.empty-ic{font-size:36px;margin-bottom:10px}
.rt{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;margin-left:5px}
.rt-admin{background:#EDE7F6;color:#5E35B1}
.rt-receiver{background:var(--g0);color:var(--g7)}
.pdf-link{display:inline-block;margin-top:6px;font-size:13px;color:var(--g7);font-weight:600}

@media (prefers-reduced-motion: reduce){ .btn,.sp{animation:none!important;transition:none!important} }
</style>
</head>
<body>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz3H8p6mnkDxKKAHUODBTvAHySZgqEBh8wrGfy51hp4eOKLVgkg6S5efm_aZ7k9WEjS/exec";
</script>

<!-- LOGIN -->
<div id="loginPage">
  <div class="lw">
    <div class="lo"><h1>🧵 Phụ kiện Lộc Nguyên</h1><p>Theo dõi xuất - nhập - tồn kho văn phòng phẩm</p></div>
    <div class="card">
      <div id="lgAl"></div>
      <div class="f"><label>TÀI KHOẢN</label><input id="lgU" type="text" placeholder="username" autocapitalize="off"/></div>
      <div class="f"><label>MẬT KHẨU</label><input id="lgP" type="password" placeholder="••••••"/></div>
      <button class="btn btn-p" onclick="doLogin()" id="lgBtn">Đăng nhập</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell" style="display:none">
  <header class="topbar">
    <div class="brand"><div class="brand-dot"></div>Phụ kiện Lộc Nguyên</div>
    <div class="uinfo"><span id="uLabel"></span><button class="btn-out" onclick="doLogout()">Đăng xuất</button></div>
  </header>
  <nav class="nav" id="mainNav"></nav>
  <main>

    <!-- TAB: XUẤT PHỤ KIỆN (role receiver) -->
    <div id="pgXuat" class="page">
      <div class="card">
        <div class="card-title">Xuất phụ kiện</div>
        <div id="xuatAl"></div>
        <div class="f">
          <label>TÊN VẬT PHẨM</label>
          <select id="xuatTen"><option value="">— Chọn vật phẩm —</option></select>
        </div>
        <div class="f">
          <label>SỐ LƯỢNG</label>
          <input id="xuatSl" type="number" min="1" placeholder="Nhập số lượng"/>
        </div>
        <div class="f">
          <label>NGƯỜI NHẬN</label>
          <input id="xuatNguoiNhan" type="text" placeholder="Họ tên người nhận"/>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Chữ ký người nhận</div>
        <div class="sig-wrap" id="swXuat"><canvas id="scXuat" height="110"></canvas><span class="sig-hint">Ký tên tại đây</span></div>
        <div class="sig-row"><button class="btn-clr" onclick="clrSig('Xuat')">Ký lại</button></div>
      </div>
      <button class="btn btn-p" id="btnXuat" onclick="submitXuat()">Ghi xuất kho</button>
    </div>

    <!-- TAB: NHẬP PHỤ KIỆN (role admin) -->
    <div id="pgNhap" class="page">
      <div class="card">
        <div class="card-title">Nhập phụ kiện</div>
        <div id="nhapAl"></div>
        <div class="f">
          <label>TÊN VẬT PHẨM</label>
          <select id="nhapTen"><option value="">— Chọn vật phẩm —</option></select>
        </div>
        <div class="f">
          <label>SỐ LƯỢNG</label>
          <input id="nhapSl" type="number" min="1" placeholder="Nhập số lượng"/>
        </div>
        <div class="f">
          <label>NGƯỜI NHẬP</label>
          <input id="nhapNguoiNhap" type="text" placeholder="Họ tên người nhập"/>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Chữ ký người nhập</div>
        <div class="sig-wrap" id="swNhap"><canvas id="scNhap" height="110"></canvas><span class="sig-hint">Ký tên tại đây</span></div>
        <div class="sig-row"><button class="btn-clr" onclick="clrSig('Nhap')">Ký lại</button></div>
      </div>
      <button class="btn btn-p" id="btnNhap" onclick="submitNhap()">Ghi nhập kho</button>
    </div>

    <!-- TAB: BÁO CÁO TỒN KHO (role admin) -->
    <div id="pgBaoCao" class="page">
      <div class="card">
        <div class="card-title">Tìm vật phẩm</div>
        <div class="search-row">
          <input id="baoCaoSearch" type="text" placeholder="Tìm theo tên vật phẩm..." oninput="filterBaoCao()"/>
        </div>
      </div>
      <div id="baoCaoBox"><div class="ld"><div class="sp"></div>Đang tải...</div></div>
    </div>

  </main>
</div>

<script>
// ══════════ STATE ══════════
let USERINFO = JSON.parse(sessionStorage.getItem("pk_ui") || "null");
let DANHMUC = [];   // cache danh sách tên vật phẩm
let BAOCAO_DATA = []; // cache dữ liệu báo cáo cho filter

// Mỗi role có bộ tab riêng. receiver chỉ thấy Xuất.
// admin thấy Nhập + Báo cáo, và trang mặc định khi vào là Nhập.
const TABS = {
  receiver: [{ id: "pgXuat", label: "Xuất phụ kiện" }],
  admin:    [{ id: "pgNhap", label: "Nhập phụ kiện" }, { id: "pgBaoCao", label: "Báo cáo tồn kho" }],
};

// ══════════ INIT ══════════
window.addEventListener("DOMContentLoaded", () => {
  setupSig("Xuat");
  setupSig("Nhap");
  if (USERINFO) showApp();
  else document.getElementById("loginPage").style.display = "block";
});

// ══════════ API ══════════
async function api(action, body = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, data: body }),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("Server trả về dữ liệu không hợp lệ"); }
    if (!data.success) throw new Error(data.message || "Lỗi không xác định");
    return data;
  } catch (e) {
    clearTimeout(timeout);
    if (e.name === "AbortError") throw new Error("Hết thời gian chờ phản hồi từ server");
    throw e;
  }
}

// ══════════ AUTH ══════════
async function doLogin() {
  const u = document.getElementById("lgU").value.trim();
  const p = document.getElementById("lgP").value;
  if (!u || !p) return showAl("lgAl", "er", "Vui lòng nhập đầy đủ tài khoản và mật khẩu");
  setBusy("lgBtn", true, "Đang đăng nhập...");
  try {
    const r = await api("login", { username: u, password: p });
    USERINFO = { role: r.role, username: r.username };
    sessionStorage.setItem("pk_ui", JSON.stringify(USERINFO));
    showApp();
  } catch (e) {
    showAl("lgAl", "er", e.message);
  } finally {
    setBusy("lgBtn", false, "Đăng nhập");
  }
}

function doLogout() {
  USERINFO = null;
  sessionStorage.removeItem("pk_ui");
  location.reload();
}

// Đây là điểm tạo ra "mỗi phiên đăng nhập 1 giao diện khác nhau":
// dựa vào USERINFO.role, ta chỉ build menu + mở trang đầu tiên tương ứng với role đó.
function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("appShell").style.display = "block";

  const roleLabel = { admin: "Quản lý", receiver: "Người nhận" };
  document.getElementById("uLabel").innerHTML =
    `${USERINFO.username} <span class="rt rt-${USERINFO.role}">${roleLabel[USERINFO.role] || USERINFO.role}</span>`;

  const tabs = TABS[USERINFO.role] || [];
  document.getElementById("mainNav").innerHTML = tabs.map((t, i) =>
    `<div class="ntab${i === 0 ? " active" : ""}" data-page="${t.id}" onclick="switchTab(this)">${t.label}</div>`
  ).join("");

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  if (tabs[0]) document.getElementById(tabs[0].id).classList.add("active");

  loadDanhMuc();
}

// ══════════ NAV ══════════
function switchTab(el) {
  document.querySelectorAll(".ntab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  const pid = el.dataset.page;
  document.getElementById(pid)?.classList.add("active");
  if (pid === "pgBaoCao") loadBaoCao();
}

// ══════════ DANH MỤC (DROPDOWN) ══════════
async function loadDanhMuc() {
  try {
    const r = await api("getDanhMuc");
    DANHMUC = r.items || [];
    fillSelect("xuatTen", DANHMUC);
    fillSelect("nhapTen", DANHMUC);
  } catch (e) { /* im lặng, dropdown giữ rỗng nếu lỗi */ }
}

function fillSelect(id, items) {
  const sel = document.getElementById(id);
  if (!sel) return;
  sel.innerHTML = '<option value="">— Chọn vật phẩm —</option>' +
    items.map(i => `<option value="${i}">${i}</option>`).join("");
}

// ══════════ SIG PAD ══════════
const SIGS = {};
function setupSig(id) {
  const canvas = document.getElementById("sc" + id);
  if (!canvas) return;
  canvas.width = canvas.parentElement.offsetWidth || 580;
  const ctx = canvas.getContext("2d");
  ctx.strokeStyle = "#1A1C1A"; ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.lineJoin = "round";
  let drawing = false;
  SIGS[id] = { ctx, canvas, ok: false };
  const pos = e => {
    const r = canvas.getBoundingClientRect(), src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * canvas.width / r.width, y: (src.clientY - r.top) * canvas.height / r.height };
  };
  const start = e => { e.preventDefault(); drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = e => { e.preventDefault(); if (!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); SIGS[id].ok = true; document.getElementById("sw" + id)?.classList.add("sig-signed"); };
  const stop = () => drawing = false;
  canvas.addEventListener("mousedown", start); canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", stop); canvas.addEventListener("mouseleave", stop);
  canvas.addEventListener("touchstart", start, { passive: false }); canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", stop);
}
function clrSig(id) {
  const s = SIGS[id]; if (!s) return;
  s.ctx.clearRect(0, 0, s.canvas.width, s.canvas.height);
  s.ok = false;
  document.getElementById("sw" + id)?.classList.remove("sig-signed");
}
const getSig = id => SIGS[id]?.canvas.toDataURL("image/png");

// ══════════ TAB XUẤT ══════════
async function submitXuat() {
  const tenVatPham = document.getElementById("xuatTen").value;
  const soLuong = document.getElementById("xuatSl").value;
  const nguoiNhan = document.getElementById("xuatNguoiNhan").value.trim();

  if (!tenVatPham || !soLuong || !nguoiNhan) return showAl("xuatAl", "er", "Vui lòng điền đầy đủ thông tin");
  if (!SIGS["Xuat"]?.ok) return showAl("xuatAl", "er", "Vui lòng ký tên trước khi xác nhận");

  setBusy("btnXuat", true, "Đang ghi nhận...");
  try {
    const r = await api("xuatKho", {
      tenVatPham, soLuong, nguoiNhan, chuKy: getSig("Xuat")
    });
    let msg = r.message || "Ghi xuất kho thành công";
    if (r.pdfUrl) msg += `<br><a class="pdf-link" href="${r.pdfUrl}" target="_blank">📄 Xem phiếu PDF</a>`;
    showAl("xuatAl", "ok", msg);
    document.getElementById("xuatTen").value = "";
    document.getElementById("xuatSl").value = "";
    document.getElementById("xuatNguoiNhan").value = "";
    clrSig("Xuat");
  } catch (e) {
    showAl("xuatAl", "er", e.message);
  } finally {
    setBusy("btnXuat", false, "Ghi xuất kho");
  }
}

// ══════════ TAB NHẬP ══════════
async function submitNhap() {
  const tenVatPham = document.getElementById("nhapTen").value;
  const soLuong = document.getElementById("nhapSl").value;
  const nguoiNhap = document.getElementById("nhapNguoiNhap").value.trim();

  if (!tenVatPham || !soLuong || !nguoiNhap) return showAl("nhapAl", "er", "Vui lòng điền đầy đủ thông tin");
  if (!SIGS["Nhap"]?.ok) return showAl("nhapAl", "er", "Vui lòng ký tên trước khi xác nhận");

  setBusy("btnNhap", true, "Đang ghi nhận...");
  try {
    const r = await api("nhapKho", {
      tenVatPham, soLuong, nguoiNhap, chuKy: getSig("Nhap")
    });
    showAl("nhapAl", "ok", r.message || "Ghi nhập kho thành công");
    document.getElementById("nhapTen").value = "";
    document.getElementById("nhapSl").value = "";
    document.getElementById("nhapNguoiNhap").value = "";
    clrSig("Nhap");
  } catch (e) {
    showAl("nhapAl", "er", e.message);
  } finally {
    setBusy("btnNhap", false, "Ghi nhập kho");
  }
}

// ══════════ TAB BÁO CÁO ══════════
async function loadBaoCao() {
  const box = document.getElementById("baoCaoBox");
  box.innerHTML = '<div class="ld"><div class="sp"></div>Đang tải...</div>';
  try {
    const r = await api("getBaoCao");
    BAOCAO_DATA = r.baoCao || [];
    renderBaoCao(BAOCAO_DATA);
  } catch (e) {
    box.innerHTML = `<div class="al al-er">${e.message}</div>`;
  }
}

function filterBaoCao() {
  const kw = document.getElementById("baoCaoSearch").value.toLowerCase();
  const filtered = BAOCAO_DATA.filter(r => !kw || r.tenVatPham.toLowerCase().includes(kw));
  renderBaoCao(filtered);
}

function renderBaoCao(rows) {
  const box = document.getElementById("baoCaoBox");
  if (!rows.length) {
    box.innerHTML = '<div class="empty"><div class="empty-ic">📦</div><p>Không có dữ liệu</p></div>';
    return;
  }

  const canMua = rows.filter(r => r.canhBao).length;
  const conDu = rows.length - canMua;

  const tableRows = rows.map(r => {
    const tag = r.canhBao
      ? `<span class="stock-tag stock-low">🟡 ${r.tonHienTai} - cần mua thêm</span>`
      : `<span class="stock-tag stock-ok">🟢 ${r.tonHienTai}</span>`;
    return `<tr>
      <td style="font-weight:600;color:var(--g7)">${r.tenVatPham}</td>
      <td style="text-align:right">${r.tonDauKy}</td>
      <td style="text-align:right;color:var(--g5)">${r.tongNhap}</td>
      <td style="text-align:right;color:var(--rd)">${r.tongXuat}</td>
      <td>${tag}</td>
    </tr>`;
  }).join("");

  box.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span class="stock-tag stock-ok">🟢 Tồn ổn định: ${conDu}</span>
      <span class="stock-tag stock-low">🟡 Cần mua thêm: ${canMua}</span>
    </div>
    <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--f1)">
      <table class="stock-table">
        <thead><tr>
          <th>Vật phẩm</th>
          <th style="text-align:right">Tồn đầu</th>
          <th style="text-align:right">Nhập</th>
          <th style="text-align:right">Xuất</th>
          <th>Tồn hiện tại</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;
}

// ══════════ HELPERS ══════════
function showAl(id, type, msg) { const el = document.getElementById(id); if (el) el.innerHTML = `<div class="al al-${type}">${msg}</div>`; }
function setBusy(id, busy, label) { const el = document.getElementById(id); if (el) { el.disabled = busy; el.textContent = label; } }
</script>
</body>
